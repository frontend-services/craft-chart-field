<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>

  <!-- Circle background -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>

  <!-- Bar chart: three columns at varied heights -->
  <rect x="18" y="46" width="16" height="32" rx="3" fill="#fff"/>
  <rect x="42" y="30" width="16" height="48" rx="3" fill="#fff"/>
  <rect x="66" y="40" width="16" height="38" rx="3" fill="#fff"/>

  <!-- Trend line connecting bar tops (combo chart feel) -->
  <polyline
    points="26,46 50,30 74,40"
    fill="none"
    stroke="#fff"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.5"
  />
</svg>
